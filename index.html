<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Download Hub</title>
<link rel="icon" type="image/png" sizes="64x64" href="logo.png">

<style>
:root {
  --bg: #0f1115;
  --card: #161a22;
  --accent: #ff9f1c;
  --text: #f5f6fa;
  --muted: #b2b6c2;
  --button: #5865F2;
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: Inter, system-ui, sans-serif; }

body {
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 2.5rem;
}

.container {
  max-width: 1100px;
  margin: auto;
}

/* HEADER */
header {
  background: linear-gradient(145deg, #1b2030, var(--card));
  border-radius: 18px;
  padding: 2.5rem;
  position: relative;
}

.title {
  display: flex;
  align-items: center;
  gap: 1rem;
  font-size: 2.5rem;
}

.subtitle {
  color: var(--muted);
  margin-top: 10px;
}

/* FIXED BUTTONS */
.top-buttons {
  position: absolute;
  top: 25px;
  right: 30px;
  display: flex;
  gap: 10px;
}

.proxy-btn {
  padding: 10px 18px;
  border-radius: 10px;
  background: var(--button);
  color: white;
  text-decoration: none;
  font-weight: 700;
  border: none;
  cursor: pointer;
}

/* DOWNLOAD GRID */
.downloads {
  margin-top: 30px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px,1fr));
  gap: 20px;
}

.card {
  background: var(--card);
  padding: 20px;
  border-radius: 15px;
  display: flex;
  flex-direction: column;
  justify-content: space-between; /* Pushes content to the top and button to bottom */
}

.card-info {
    margin-bottom: 15px; /* Space between info and button */
}

.card h3 {
  margin-bottom: 5px;
  font-size: 1.3rem;
}

.card p {
  color: var(--muted);
  font-size: 0.9rem;
  margin-bottom: 10px;
}

.card .version-type {
    font-size: 0.8rem;
    color: var(--accent);
    margin-bottom: 10px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

.card .version-type span {
    background: rgba(255, 159, 28, 0.1);
    padding: 3px 8px;
    border-radius: 5px;
}

/* Download Button Specifics */
.download-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: auto; /* Pushes this to the bottom */
    padding-top: 15px;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
}

.download-footer .stars {
  display: flex;
  align-items: center;
  gap: 5px;
  color: var(--accent);
  font-size: 0.9rem;
}

.download-button {
  padding: 10px 18px;
  border-radius: 10px;
  background: var(--button);
  color: white;
  text-decoration: none;
  font-weight: 700;
  border: none;
  cursor: pointer;
  transition: background 0.2s;
}

.download-button:hover {
  background: #4a55f2; /* Slightly darker shade */
}

/* ===== GAMES OVERLAY ===== */
#gamesOverlay {
  position: fixed;
  inset: 0;
  background: var(--bg); /* Use theme background */
  z-index: 999;
  display: none;
  flex-direction: column;
}

#gamesHeader {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 25px; /* Increased padding */
  background: var(--card); /* Use theme card background */
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

#gamesHeader span {
    font-size: 1.5rem;
    font-weight: bold;
}

#closeGames {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 1.5rem;
  cursor: pointer;
  padding: 5px 10px;
  transition: color 0.2s;
}

#closeGames:hover {
    color: var(--accent);
}

#gamesContainer {
  flex: 1;
  overflow-y: auto; /* Ensure scrolling if content exceeds height */
  padding: 20px;
}
</style>
</head>

<body>

<!-- ===== GAMES OVERLAY ===== -->
<div id="gamesOverlay">
  <div id="gamesHeader">
    <span>Game Hub</span>
    <button id="closeGames">X</button>
  </div>
  <div id="gamesContainer"></div>
</div>

<main class="container">

<header>
  <h1 class="title">
    <img src="logo.png" width="40">
    Download Hub
  </h1>

  <p class="subtitle">Official downloads hosted directly from this site.</p>

  <!-- BUTTONS -->
  <div class="top-buttons">
    <a href="https://greengru34alt.github.io/staticproxFIX/" class="proxy-btn">Proxy</a>
    <button id="openGames" class="proxy-btn" style="background:#ff9f1c;">Games</button>
  </div>
</header>

<section class="downloads" id="cardsGrid">
  <!-- cards will load here dynamically -->
</section>

</main>

<!-- ===== LUMIN SDK ===== -->
<script src="https://cdn.jsdelivr.net/gh/luminsdk/script@latest/lumin.min.js"></script>

<script>
// ===== INIT FUNCTION TO LOAD CARDS =====
async function init(){
  try {
    const cardsData = await fetch('cards.json').then(response => {
      if (!response.ok) {
        throw new Error(`HTTP error! status: ${response.status}`);
      }
      return response.json();
    });

    const grid = document.getElementById('cardsGrid');
    grid.innerHTML = ''; // Clear existing cards

    cardsData.forEach(card => {
      const el = document.createElement('div');
      el.className = 'card';

      // Constructing the HTML for each card based on original UI
      el.innerHTML = `
        <div class="card-info">
          <h3>${card.name}</h3>
          <p>${card.description}</p>
          <div class="version-type">
            <span>Version: ${card.version}</span>
            <span>Type: ${card.type}</span>
          </div>
        </div>
        <div class="download-footer">
          <div class="stars">
            <!-- Placeholder for stars, assuming rating info is in cards.json -->
            <!-- Example: <span class="star">★</span><span class="star">★</span>... -->
            <span>${card.rating ? '★'.repeat(Math.round(card.rating)) + ` (${card.ratingCount})` : ''}</span>
          </div>
          <a href="${card.asset}" download class="download-button">Download</a>
        </div>
      `;
      grid.appendChild(el);
    });

  } catch (e) {
    console.error("Failed to load or render cards:", e);
    // Display an error message to the user
    const grid = document.getElementById('cardsGrid');
    grid.innerHTML = '<p style="color: red;">Could not load downloads. Please try again later.</p>';
  }
}

// ===== START SITE =====
init();


// ===== LUMIN GAMES INTEGRATION =====
let luminLoaded = false; // Flag to ensure Lumin is only initialized once

document.getElementById('openGames').addEventListener('click', () => {
  document.getElementById('gamesOverlay').style.display = 'flex';

  // Initialize Lumin SDK only if it hasn't been loaded yet
  if (!luminLoaded) {
    // Use a slight delay to ensure the overlay is displayed and the DOM is ready
    setTimeout(() => {
      try {
        Lumin.init({
          container: '#gamesContainer',
          theme: 'dark' // Matches your site's theme
        });
        luminLoaded = true;
        console.log("Lumin SDK Initialized");
      } catch (error) {
        console.error("Error initializing Lumin SDK:", error);
        // Optionally display an error message to the user within the overlay
        document.getElementById('gamesContainer').innerHTML = '<p style="color: red;">Failed to load games.</p>';
      }
    }, 100); // 100ms delay
  }
});

document.getElementById('closeGames').addEventListener('click', () => {
  document.getElementById('gamesOverlay').style.display = 'none';
});
</script>

</body>
</html>
