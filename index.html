<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Download Hub</title>
<link rel="icon" type="image/png" sizes="64x64" href="logo.png">
<style>
:root {
  --bg: #0f1115;
  --card: #161a22;
  --accent: #ff9f1c;
  --text: #f5f6fa;
  --muted: #b2b6c2;
  --button: #5865F2;
}
* { box-sizing: border-box; margin: 0; padding: 0; font-family: Inter, system-ui, sans-serif; }
body { background: transparent; color: var(--text); min-height: 100vh; padding: 2.5rem; position: relative; overflow-x: hidden; }

.proxy-btn { position: absolute; top: 25px; right: 30px; padding: 10px 18px; border-radius: 10px; background: var(--button); color: white; text-decoration: none; font-weight: 700; box-shadow: 0 10px 22px rgba(88,101,242,0.45); transition: transform .2s ease, box-shadow .2s ease; }
.proxy-btn:hover { transform: scale(1.08); box-shadow: 0 18px 40px rgba(88,101,242,0.65); }

#stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

.container { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; display: grid; gap: 2.5rem; }

header { background: linear-gradient(145deg, #1b2030, var(--card)); border-radius: 18px; padding: 2.5rem; box-shadow: 0 20px 50px rgba(0,0,0,0.45); position: relative; }

.title { display: flex; align-items: center; gap: 1rem; font-size: clamp(2rem, 5vw, 3rem); margin-bottom: 0.75rem; }
.title img { width: 48px; height: 48px; filter: drop-shadow(0 0 14px rgba(88,255,120,0.6)); }
.subtitle { color: var(--muted); max-width: 650px; font-size: 1.05rem; }

.downloads { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1.75rem; }

.card { background: var(--card); border-radius: 16px; padding: 1.75rem; box-shadow: 0 12px 30px rgba(0,0,0,0.35); transition: transform 0.25s ease, box-shadow 0.25s ease; opacity: 0; transform: translateY(32px); animation: cardFadeIn 0.55s ease forwards; position: relative; }
@keyframes cardFadeIn { to { opacity: 1; transform: translateY(0); } }
.card:hover { transform: scale(1.06); box-shadow: 0 28px 60px rgba(0,0,0,0.55); }

.new-ribbon { position: absolute; top: 12px; right: 12px; background: #2ecc71; color: #fff; font-size: 0.65rem; font-weight: 800; padding: 0.2rem 0.55rem; border-radius: 999px; letter-spacing: 0.05em; text-transform: uppercase; }

.tag { display: inline-block; background: rgba(255,159,28,0.15); color: var(--accent); padding: 0.35rem 0.7rem; border-radius: 999px; font-size: 0.75rem; font-weight: 700; margin-bottom: 0.75rem; }
.card p { color: var(--muted); font-size: 0.95rem; margin-bottom: 1.25rem; }
.meta { font-size: 0.8rem; color: #9aa0b4; margin-bottom: 0.4rem; }

.download-btn { display: inline-flex; align-items: center; gap: 0.6rem; background: var(--button); color: #fff; padding: 0.7rem 1.15rem; border-radius: 10px; text-decoration: none; font-weight: 700; box-shadow: 0 10px 22px rgba(88,101,242,0.45); transition: transform 0.2s ease, box-shadow 0.2s ease; }
.download-btn:hover { transform: scale(1.08); box-shadow: 0 18px 40px rgba(88,101,242,0.65); }

/* Skeleton loader */
.skeleton { background: var(--card); border-radius: 16px; padding: 1.75rem; opacity: 0.5; }
.skel-line { height: 14px; border-radius: 6px; background: #2a3045; margin-bottom: 10px; animation: shimmer 1.4s infinite; }
.skel-line.short { width: 40%; } .skel-line.med { width: 65%; } .skel-line.long { width: 90%; }
.skel-btn { height: 38px; width: 120px; border-radius: 10px; background: #2a3045; margin-top: 6px; animation: shimmer 1.4s infinite; }
@keyframes shimmer { 0%,100% { opacity: 0.5; } 50% { opacity: 0.8; } }

footer { text-align: center; color: var(--muted); font-size: 0.85rem; padding-bottom: 1rem; }

.header-actions { display: flex; align-items: center; gap: 1rem; margin-top: 1.25rem; flex-wrap: wrap; }
#search { width: 100%; max-width: 420px; padding: 0.75rem 1rem; border-radius: 10px; border: none; outline: none; background: var(--card); color: var(--text); box-shadow: 0 8px 20px rgba(0,0,0,0.35); font-size: 0.95rem; }
#search::placeholder { color: var(--muted); }

.request-btn { padding: 0.75rem 1.2rem; border-radius: 10px; background: rgba(255,159,28,0.15); color: var(--accent); border: 1.5px solid rgba(255,159,28,0.35); font-weight: 700; font-size: 0.95rem; cursor: pointer; transition: background 0.2s ease, transform 0.2s ease; }
.request-btn:hover { background: rgba(255,159,28,0.25); transform: scale(1.05); }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
.modal-overlay.open { display: flex; }
.modal { background: #1b2030; border-radius: 18px; padding: 2.25rem; max-width: 480px; width: 90%; box-shadow: 0 30px 80px rgba(0,0,0,0.7); position: relative; animation: modalPop 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards; }
@keyframes modalPop { from { opacity:0; transform:scale(0.88) translateY(20px); } to { opacity:1; transform:scale(1) translateY(0); } }
.modal h2 { font-size: 1.5rem; margin-bottom: 0.4rem; }
.modal > div > p { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
.modal label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 0.4rem; margin-top: 1rem; }
.modal input, .modal textarea, .modal select { width: 100%; padding: 0.7rem 0.9rem; border-radius: 10px; border: 1.5px solid #2a3045; background: #0f1115; color: var(--text); font-size: 0.95rem; outline: none; transition: border-color 0.2s; font-family: inherit; }
.modal input:focus, .modal textarea:focus, .modal select:focus { border-color: var(--button); }
.modal textarea { resize: vertical; min-height: 90px; }
.modal-actions { display: flex; gap: 0.75rem; margin-top: 1.75rem; }
.modal-submit { flex: 1; padding: 0.75rem; border-radius: 10px; border: none; background: var(--button); color: white; font-weight: 700; font-size: 1rem; cursor: pointer; box-shadow: 0 8px 20px rgba(88,101,242,0.4); transition: transform 0.2s, box-shadow 0.2s; }
.modal-submit:hover { transform: scale(1.04); box-shadow: 0 14px 30px rgba(88,101,242,0.6); }
.modal-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
.modal-cancel { padding: 0.75rem 1.2rem; border-radius: 10px; border: 1.5px solid #2a3045; background: transparent; color: var(--muted); font-size: 0.95rem; cursor: pointer; transition: border-color 0.2s, color 0.2s; }
.modal-cancel:hover { border-color: var(--muted); color: var(--text); }
.modal-close { position: absolute; top: 1.1rem; right: 1.25rem; background: none; border: none; color: var(--muted); font-size: 1.4rem; cursor: pointer; transition: color 0.2s; }
.modal-close:hover { color: var(--text); }
.modal-success { text-align: center; padding: 1rem 0 0.5rem; display: none; }
.modal-success .checkmark { font-size: 3rem; margin-bottom: 0.75rem; }
.modal-success h3 { font-size: 1.3rem; margin-bottom: 0.5rem; }

/* Back to top */
#backToTop { position: fixed; bottom: 2rem; right: 2rem; z-index: 50; width: 48px; height: 48px; border-radius: 50%; background: var(--button); color: white; border: none; font-size: 1.3rem; cursor: pointer; box-shadow: 0 8px 24px rgba(88,101,242,0.5); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transform: translateY(16px); transition: opacity 0.3s ease, transform 0.3s ease, box-shadow 0.2s ease; }
#backToTop.visible { opacity: 1; pointer-events: all; transform: translateY(0); }
#backToTop:hover { box-shadow: 0 14px 36px rgba(88,101,242,0.75); transform: translateY(-3px); }

/* Toast */
#toast { position: fixed; bottom: 5.5rem; right: 2rem; z-index: 60; background: #1b2030; border: 1.5px solid rgba(88,101,242,0.4); color: var(--text); padding: 0.7rem 1.2rem; border-radius: 12px; font-size: 0.9rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); opacity: 0; transform: translateY(10px); pointer-events: none; transition: opacity 0.3s, transform 0.3s; }
#toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<canvas id="stars"></canvas>
<button id="backToTop" title="Back to top" aria-label="Back to top">↑</button>
<div id="toast"></div>

<div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true">
  <div class="modal">
    <button class="modal-close" id="modalClose">×</button>
    <div id="modalForm">
      <h2>📥 Request a Download</h2>
      <p>Know something that should be here? Let us know!</p>
      <label for="reqName">Your Name (optional)</label>
      <input type="text" id="reqName" placeholder="e.g. GreenGru" />
      <label for="reqGame">Game / App Name *</label>
      <input type="text" id="reqGame" placeholder="e.g. SomeClient 2.0" />
      <label for="reqType">Type</label>
      <select id="reqType">
        <option value="client">Minecraft Client</option>
        <option value="html">HTML Game Hub</option>
        <option value="tool">Tool / Utility</option>
        <option value="other">Other</option>
      </select>
      <label for="reqNote">Any extra details?</label>
      <textarea id="reqNote" placeholder="Link, version, why it's cool..."></textarea>
      <div class="modal-actions">
        <button class="modal-submit" id="modalSubmit">Submit Request</button>
        <button class="modal-cancel" id="modalCancel">Cancel</button>
      </div>
    </div>
    <div class="modal-success" id="modalSuccess">
      <div class="checkmark">🎉</div>
      <h3>Request Sent!</h3>
      <p style="color:var(--muted);font-size:0.9rem">Thanks for the suggestion. We'll check it out.</p>
    </div>
  </div>
</div>

<main class="container">
  <header>
    <h1 class="title">
      <img src="logo.png" alt="Logo">
      Download Hub
    </h1>
    <p class="subtitle">Official downloads hosted directly from this site.</p>
    <div class="header-actions">
      <input id="search" type="text" placeholder="Search downloads… (press / to focus)" />
      <button class="request-btn" id="openModal">📥 Request a Download</button>
    </div>
    <a href="https://greengrunblocked.github.io/m-nimum/" class="proxy-btn">Go To Proxy</a>
  </header>

  <section class="downloads" id="cardsGrid">
    <div class="skeleton"><div class="skel-line short"></div><div class="skel-line med"></div><div class="skel-line long"></div><div class="skel-btn"></div></div>
    <div class="skeleton"><div class="skel-line short"></div><div class="skel-line med"></div><div class="skel-line long"></div><div class="skel-btn"></div></div>
    <div class="skeleton"><div class="skel-line short"></div><div class="skel-line med"></div><div class="skel-line long"></div><div class="skel-btn"></div></div>
  </section>

  <footer>
    © 2026 Download Hub ·
    <a href="admin.html" style="color:var(--muted);text-decoration:none;opacity:0.35;font-size:0.8rem">admin</a>
  </footer>
</main>

<script>
// ===== LOAD CARDS FROM cards.json =====
async function loadCards() {
  const grid = document.getElementById('cardsGrid');
  try {
    const res = await fetch('cards.json?v=' + Date.now());
    const cards = await res.json();
    grid.innerHTML = '';
    cards.forEach((card, i) => {
      const el = document.createElement('div');
      el.className = 'card';
      el.dataset.asset = card.asset;
      el.style.animationDelay = (i * 0.05) + 's';
      el.innerHTML = `
        ${card.isNew ? '<span class="new-ribbon">NEW</span>' : ''}
        <span class="tag">${escHtml(card.tag)}</span>
        <h3>${escHtml(card.name)}</h3>
        <p class="meta">Version: ${escHtml(card.version)} &bull; ${escHtml(card.fileType)} file</p>
        <p>${escHtml(card.description)}</p>
        <a class="download-btn" href="${escHtml(card.asset)}" download>⬇ Download</a>
      `;
      grid.appendChild(el);
    });
    initSearch();
  } catch (e) {
    grid.innerHTML = '<p style="color:var(--muted);padding:1rem;grid-column:1/-1">Failed to load downloads. Please refresh the page.</p>';
  }
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadCards();

// ===== SEARCH =====
function initSearch() {
  const s = document.getElementById('search');
  s.addEventListener('input', () => {
    const val = s.value.toLowerCase();
    document.querySelectorAll('.card').forEach(c => {
      c.style.display = c.innerText.toLowerCase().includes(val) ? 'block' : 'none';
    });
  });
}

document.addEventListener('keydown', e => {
  const s = document.getElementById('search');
  if (e.key === '/' && document.activeElement !== s) { e.preventDefault(); s.focus(); }
  if (e.key === 'Escape' && document.activeElement === s) { s.value = ''; s.dispatchEvent(new Event('input')); s.blur(); }
});

// ===== BACK TO TOP =====
const btt = document.getElementById('backToTop');
window.addEventListener('scroll', () => btt.classList.toggle('visible', scrollY > 300));
btt.addEventListener('click', () => scrollTo({ top: 0, behavior: 'smooth' }));

// ===== MODAL =====
const overlay   = document.getElementById('modalOverlay');
const formDiv   = document.getElementById('modalForm');
const successDiv= document.getElementById('modalSuccess');
const submitBtn = document.getElementById('modalSubmit');
const toast     = document.getElementById('toast');

function openModal() {
  overlay.classList.add('open');
  formDiv.style.display = 'block';
  successDiv.style.display = 'none';
  ['reqGame','reqName','reqNote'].forEach(id => document.getElementById(id).value = '');
}
function closeModal() { overlay.classList.remove('open'); }

document.getElementById('openModal').addEventListener('click', openModal);
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalCancel').addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });

submitBtn.addEventListener('click', async () => {
  const game = document.getElementById('reqGame').value.trim();
  if (!game) {
    const el = document.getElementById('reqGame');
    el.focus(); el.style.borderColor = '#e74c3c';
    setTimeout(() => el.style.borderColor = '', 1500);
    return;
  }
  submitBtn.disabled = true; submitBtn.textContent = 'Sending…';
  try {
    const res = await fetch('https://formspree.io/f/xyknoqkd', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({
        name:  document.getElementById('reqName').value.trim() || 'Anonymous',
        game,
        type:  document.getElementById('reqType').value,
        notes: document.getElementById('reqNote').value.trim()
      })
    });
    if (res.ok) {
      formDiv.style.display = 'none';
      successDiv.style.display = 'block';
      setTimeout(() => { closeModal(); showToast('✅ Request submitted!'); }, 1800);
    } else throw new Error();
  } catch { showToast('❌ Submission failed. Try again!'); }
  finally { submitBtn.disabled = false; submitBtn.textContent = 'Submit Request'; }
});

function showToast(msg, duration = 3000) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), duration);
}

// ===== STAR FIELD =====
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
let w, h, stars;
function resize() { w = canvas.width = innerWidth; h = canvas.height = innerHeight; }
function createStars(n=220) {
  stars = Array.from({length:n}, () => ({
    x: Math.random()*w, y: Math.random()*h,
    z: Math.random()*0.8+0.2, r: Math.random()*1.2+0.3
  }));
}
function draw() {
  ctx.fillStyle = '#0f1115'; ctx.fillRect(0,0,w,h);
  for (const s of stars) {
    ctx.globalAlpha = s.z; ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
    s.y += s.z*0.35;
    if (s.y > h) { s.y = 0; s.x = Math.random()*w; }
  }
  ctx.globalAlpha = 1;
  requestAnimationFrame(draw);
}
window.addEventListener('resize', () => { resize(); createStars(); });
resize(); createStars(); draw();
</script>
</body>
</html>
